<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhishGuard — AI Phishing Detection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body {
      background: #0a0e1a;
      color: #e8f4fd;
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0e1a; }
    ::-webkit-scrollbar-thumb { background: #1e2d45; border-radius: 3px; }

    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes fadeIn  { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }

    .fade-in  { animation: fadeIn  0.4s ease-out; }
    .slide-up { animation: slideUp 0.4s ease-out; }

    /* ── Sidebar layout ── */
    .sidebar {
      width: 220px; flex-shrink: 0;
      background: #0d1626;
      border-right: 1px solid #1e2d45;
      display: flex; flex-direction: column;
      height: 100vh; position: sticky; top: 0;
      overflow-y: auto;
    }
    .main-content {
      flex: 1; overflow-y: auto;
      padding: 28px 24px;
      min-height: 100vh;
    }
    .mobile-topbar { display: none; }
    .overlay { display: none; }

    /* ── Detector grid ── */
    .detector-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: start;
    }
    .model-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    /* ── History row ── */
    .history-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; border-radius: 12px;
      transition: background 0.15s;
    }
    .history-row:hover { background: rgba(255,255,255,0.03) !important; }
    .history-meta {
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed; left: -220px; top: 0; bottom: 0; z-index: 100;
        transition: left 0.25s ease;
        height: 100%;
      }
      .sidebar.open { left: 0; }
      .overlay {
        display: block; position: fixed; inset: 0;
        background: rgba(0,0,0,0.5); z-index: 99;
        opacity: 0; pointer-events: none; transition: opacity 0.25s;
      }
      .overlay.visible { opacity: 1; pointer-events: all; }
      .mobile-topbar {
        display: flex; align-items: center; gap: 10px;
        background: #0d1626; border-bottom: 1px solid #1e2d45;
        padding: 10px 16px; position: sticky; top: 0; z-index: 50;
      }
      .main-content { padding: 16px; padding-top: 66px; }
      .detector-grid { grid-template-columns: 1fr; }
      .history-confidence, .history-time { display: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
